---
- name: Remove packages that conflict with Docker CE
  ansible.builtin.apt:
    name: "{{ docker_conflicting_packages }}"
    state: absent

- name: Install Docker repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Configure the official Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - "{{ docker_repository_url }}"
    suites:
      - "{{ ansible_facts.distribution_release }}"
    components:
      - "{{ docker_apt_channel }}"
    signed_by: "{{ docker_repository_url }}/gpg"
    state: present
    enabled: true

- name: Install Docker Engine and CLI plugins
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: "{{ docker_packages_state }}"
    update_cache: true

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: "{{ docker_service_state }}"
    enabled: "{{ docker_service_enabled }}"
