---
- name: Create the Docker configuration directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: docker_daemon_options | length > 0

- name: Configure Docker daemon options
  ansible.builtin.copy:
    content: "{{ docker_daemon_options | to_nice_json }}\n"
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  when: docker_daemon_options | length > 0
  notify: Restart Docker

- name: Apply Docker configuration before dependent roles run
  ansible.builtin.meta: flush_handlers
  when: docker_daemon_options | length > 0

- name: Add configured users to the Docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups:
      - docker
    append: true
  loop: "{{ docker_users }}"
