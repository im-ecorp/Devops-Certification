---
# Docker's stable apt repository is used for supported Debian and Ubuntu hosts.
docker_apt_channel: stable
docker_repository_url: >-
  https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}

# These are the packages Docker documents for a complete Engine installation.
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
docker_packages_state: present

# Docker requires these potentially conflicting distribution packages to be absent.
# Removing them does not remove /var/lib/docker or existing container data.
docker_conflicting_packages:
  - docker.io
  - docker-compose
  - docker-compose-v2
  - docker-doc
  - podman-docker
  - containerd
  - runc

docker_service_state: started
docker_service_enabled: true

# Members of the docker group effectively receive root-level privileges.
docker_users: []

# When non-empty, this dictionary is written to /etc/docker/daemon.json.
docker_daemon_options: {}
