---
- name: Update the apt cache and safely upgrade installed packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: safe
    autoclean: true
    autoremove: true

- name: Set the hostname from inventory
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Install base administration packages
  ansible.builtin.apt:
    name:
      - vim
      - curl
      - wget
      - git
      - htop
      - bash-completion
      - iptables-persistent
      - tmux
    state: present


- name:  fail2ban Installation and configuration
  ansible.builtin.include_tasks:
    file: fail2ban.yml
  tags:
    - fail2ban_setup